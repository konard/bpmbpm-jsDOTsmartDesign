<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>jsDOTsmartDesign - исправлено (Jspreadsheet CE)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #spreadsheet { margin-top: 20px; }

        /* Диагностическое окно */
        #diagnostic-log {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 450px;
            max-height: 280px;
            overflow: auto;
            background: #0a0a0a;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 8px;
            border: 1px solid #0f0;
            border-radius: 5px;
            z-index: 9999;
            opacity: 0.95;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.6);
        }
        .log-entry { border-bottom: 1px solid #333; margin: 3px 0; }
        .log-error { color: #ff8888; }
        .log-warn  { color: #ffaa66; }
        .log-info  { color: #88ff88; }
        .log-success { color: #00ffaa; }
    </style>

    <!-- Правильные, проверенные ссылки на библиотеки (не jsuites.net!) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites@4.8.0/dist/jsuites.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4.11.0/dist/jspreadsheet.css">
    <script src="https://cdn.jsdelivr.net/npm/jsuites@4.8.0/dist/jsuites.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4.11.0/dist/jspreadsheet.min.js"></script>
</head>
<body>

<h1>jsDOTsmartDesign (исправленная версия)</h1>
<p>Таблица создаётся с помощью <strong>Jspreadsheet CE</strong> (замена jexcel).</p>
<div id="spreadsheet"></div>

<div id="diagnostic-log">
    <strong>📋 Лог загрузки и ошибок</strong><br>
</div>

<script>
    // ---- система логирования ----
    const logContainer = document.getElementById('diagnostic-log');
    function addLog(msg, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logContainer.appendChild(entry);
        logContainer.scrollTop = logContainer.scrollHeight;
        // дублируем в консоль браузера
        if (type === 'error') console.error(msg);
        else if (type === 'warn') console.warn(msg);
        else console.log(msg);
    }

    // ---- диагностика при загрузке страницы ----
    window.addEventListener('load', function() {
        addLog('▶️ Страница загружена. Проверка библиотек...');

        // Проверяем jsuites
        if (typeof jsuites !== 'undefined') {
            addLog('✅ jsuites загружена успешно' + (jsuites.version ? ' (v' + jsuites.version + ')' : ''), 'success');
        } else {
            addLog('❌ ОШИБКА: jsuites не найдена. Проверьте сетевые блокировки.', 'error');
        }

        // Проверяем jspreadsheet (новое имя)
        if (typeof jspreadsheet !== 'undefined') {
            addLog('✅ jspreadsheet (Jspreadsheet CE) загружена успешно', 'success');
        } else {
            addLog('❌ ОШИБКА: jspreadsheet не загружена. Возможно, старая jexcel всё ещё используется.', 'error');
        }

        // Если старая jexcel всё ещё присутствует (предупреждение)
        if (typeof jexcel !== 'undefined') {
            addLog('⚠️ Обнаружена устаревшая глобальная переменная jexcel. Код должен использовать jspreadsheet.', 'warn');
        }

        // ---- СОЗДАНИЕ ТАБЛИЦЫ ----
        // Пример данных (вы можете заменить на свои)
        const sampleData = [
            ['Параметр', 'Значение 1', 'Значение 2', 'Значение 3'],
            ['Скорость', 95, 120, 88],
            ['Точность', 87.5, 92.3, 79.8],
            ['Надёжность', 'Высокая', 'Средняя', 'Высокая']
        ];

        const container = document.getElementById('spreadsheet');
        if (!container) {
            addLog('❌ Не найден контейнер #spreadsheet', 'error');
            return;
        }

        try {
            if (typeof jspreadsheet !== 'undefined') {
                addLog('🔄 Создаём таблицу через jspreadsheet()...');
                const table = jspreadsheet(container, {
                    data: sampleData,
                    columns: [
                        { type: 'text', title: 'Показатель', width: '120px' },
                        { type: 'text', title: 'Колонка A' },
                        { type: 'text', title: 'Колонка B' },
                        { type: 'text', title: 'Колонка C' }
                    ],
                    allowToolbar: true,
                    contextMenu: true,
                    tableOverflow: true,
                    tableWidth: '100%'
                });
                addLog('✅ Таблица успешно создана!', 'success');
                addLog('ℹ️ Количество строк: ' + table.getData().length, 'info');
            } 
            else if (typeof jexcel !== 'undefined') {
                // запасной вариант (не должен сработать, если ссылки правильные)
                addLog('⚠️ Используем старый jexcel (не рекомендуется). Проверьте подключение jspreadsheet-ce.', 'warn');
                const table = jexcel(container, {
                    data: sampleData,
                    columns: [{ type: 'text' }, { type: 'text' }, { type: 'text' }, { type: 'text' }]
                });
                addLog('⚠️ Таблица создана через jexcel. Лучше перейти на jspreadsheet.', 'warn');
            }
            else {
                addLog('❌ Нет доступного метода для создания таблицы. Проверьте загрузку скриптов.', 'error');
                container.innerHTML = '<p style="color:red; background:#fee; padding:10px;">Ошибка: библиотека таблиц не загружена. Проверьте соединение с CDN.</p>';
            }
        } catch (err) {
            addLog('❌ ИСКЛЮЧЕНИЕ при создании таблицы: ' + err.message, 'error');
            addLog('Stack: ' + (err.stack || 'нет стека'), 'error');
            container.innerHTML = '<p style="color:red;">Ошибка инициализации: ' + err.message + '</p>';
        }

        addLog('🏁 Диагностика завершена.');
    });

    // Глобальный перехватчик ошибок (сетевые, скрипты)
    window.addEventListener('error', function(e) {
        let msg = `Глобальная ошибка: ${e.message} (${e.filename || 'скрипт'}:${e.lineno || '?'})`;
        if (e.target && e.target.src) msg = `Не удалось загрузить ресурс: ${e.target.src}`;
        addLog(msg, 'error');
    });

    // Дополнительная проверка после загрузки всех ресурсов
    window.addEventListener('unhandledrejection', function(e) {
        addLog('Необработанный Promise rejection: ' + (e.reason?.message || e.reason), 'error');
    });
</script>

</body>
</html>
