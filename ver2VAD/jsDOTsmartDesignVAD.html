<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>jsDOT SmartDesign VAD</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jexcel/4.6.1/jexcel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jexcel/4.6.1/jexcel.css" type="text/css">
  <script src="https://jsuites.net/v4/jsuites.js"></script>
  <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css">
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #202124; }
    h1 { font-size: 26px; margin-bottom: 8px; }
    .toolbar { display: flex; gap: 12px; align-items: center; margin: 16px 0; flex-wrap: wrap; }
    label { font-weight: 700; }
    select, button { font: inherit; padding: 6px 10px; }
    button { cursor: pointer; }
    #notation-description { max-width: 980px; margin: 10px 0 18px; }
    #dot-output { width: min(100%, 1100px); height: 260px; margin-top: 18px; font-family: Consolas, monospace; }
  </style>
</head>
<body>
  <h1>jsDOT SmartDesign: VAD-образные нотации</h1>
  <p>В простейшем случае - просто нажать "Схема"</p>
  <div id="spreadsheet1"></div>
  <div class="toolbar">
    <label for="notation">Выбор VAD-образной нотации:</label>
    <select id="notation"></select>
    <button id="graph-button" type="button">Схема</button>
  </div>
  <p id="notation-description"></p>
  <textarea id="dot-output" readonly aria-label="DOT-код"></textarea>
  <script type="module">
    import { mountVadApp } from "./js/vad-app.js";
    mountVadApp({ document, jexcel, window });
  </script>
</body>
</html>
